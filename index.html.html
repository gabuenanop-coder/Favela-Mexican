<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emprendimiento escolar</title>
</head>
<body>
  <header>
    <h1>Favela Mexican</h1>
    <p>Somos un emprendimiento enfocado en traer diversidad de productos picantes como son los takis con chamoy y tajin</p>
  </header>
  <main>
    <section id="registro">
      <h2>Formulario de registro</h2>
      <form action="#" method="post">
        <label for="nombre">Nombre completo</label>
        <input id="nombre" name="nombre" type="text" required>
        <label for="correo">Correo</label>
        <input id="correo" name="correo" type="email" required>
        <label for="area">Área de interés</label>
        <select id="area" name="area" required>
          <option value="">Selecciona una opción</option>
          <option value="Tajin">Tajin</option>
          <option value="Chamoy">Chamoy</option>
        </select>
        <button type="submit">Picante</button>
      </form>
    </section>
    <section id="datos">
      <h2>Datos del proyecto</h2>
      <table>
        <caption>Productos</caption>
        <tr><th>Elemento</th><th>Detalle</th></tr>
        <tr><td>Mangonadas</td><td>Mangonadas</td></tr>
        <tr><td>Takis</td><td>Takis</td></tr>
      </table>
    </section>
  </main>
  <footer>
    <p>Creado por: Genesis Buenaño</p>
  </footer>
</body>
</html>
